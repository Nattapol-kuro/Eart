<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>โครงสร้างโลกตามองค์ประกอบทางเคมี</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#04080f; color:#e8eaf0; font-family:'Sarabun',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  #top-bar { flex-shrink:0; text-align:center; padding:10px 12px 4px; z-index:10; }
  #top-bar h1 { font-size:1rem; font-weight:700; line-height:1.3;
    background:linear-gradient(90deg,#ff6b35,#f7c59f,#fffbe6,#a8d8ea);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  #top-bar p { font-size:0.6rem; color:#556070; font-family:'Space Mono',monospace; margin-top:2px; }

  #canvas-wrap { flex:1; position:relative; min-height:0; overflow:hidden; }
  #canvas-wrap canvas { position:absolute; top:0; left:0; width:100%; height:100%; touch-action:none; }

  /* SVG arrow overlay */
  #arrow-svg {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:4; overflow:visible;
  }

  #slice-btn {
    position:absolute; top:10px; left:10px; z-index:5;
    background:rgba(10,20,35,0.85); border:1px solid rgba(168,216,234,0.4);
    border-radius:20px; padding:6px 14px; color:#a8d8ea;
    font-family:'Sarabun',sans-serif; font-size:0.75rem; cursor:pointer;
  }
  #hint { position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
    font-size:0.6rem; color:#2a3a4a; font-family:'Space Mono',monospace; pointer-events:none; white-space:nowrap; }

  #bottom-panel { flex-shrink:0; padding:6px 12px 14px; z-index:10; background:rgba(4,8,15,0.95); }
  #chip-row { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
  #chip-row::-webkit-scrollbar { display:none; }
  .chip { flex-shrink:0; display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05);
    border:1.5px solid var(--c); border-radius:20px; padding:5px 12px; font-size:0.75rem;
    font-weight:600; color:var(--c); cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .chip .dot { width:7px; height:7px; border-radius:50%; background:var(--c); flex-shrink:0; }
  .chip.active { background:var(--c); color:#04080f; font-weight:700; }
  .chip.active .dot { background:#04080f; }

  #detail-card { background:rgba(10,18,30,0.95); border:1px solid rgba(255,255,255,0.08);
    border-left:3px solid var(--dc,#4a9fd4); border-radius:10px; padding:10px 14px; }
  #detail-card h2 { font-size:0.88rem; font-weight:700; color:var(--dc,#4a9fd4); margin-bottom:5px; }
  #detail-card table { width:100%; font-size:0.72rem; border-collapse:collapse; }
  #detail-card td { padding:2px 0; color:#b0bcc8; vertical-align:top; line-height:1.5; }
  #detail-card td:first-child { color:#556070; width:72px; font-family:'Space Mono',monospace; font-size:0.6rem; }

  /* Arrow animation */
  .layer-arrow { transition: opacity 0.3s; }
  .arrow-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 0.4s ease forwards; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  .arrow-dot { animation: popDot 0.2s 0.35s ease both; transform-origin: center; transform-box: fill-box; }
  @keyframes popDot { from { r: 0; opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<div id="top-bar">
  <h1>🌍 โครงสร้างโลกตามองค์ประกอบทางเคมี</h1>
  <p>Earth's Structure by Chemical Composition — Interactive 3D</p>
</div>

<div id="canvas-wrap">
  <button id="slice-btn">✂️ ตัดครึ่ง</button>
  <svg id="arrow-svg"></svg>
  <div id="hint">👆 ลากนิ้วหมุน • หยิก zoom</div>
</div>

<div id="bottom-panel">
  <div id="chip-row">
    <div class="chip active" style="--c:#4a9fd4" data-layer="0"><span class="dot"></span>เปลือกโลก</div>
    <div class="chip" style="--c:#c04010" data-layer="1"><span class="dot"></span>เนื้อโลก</div>
    <div class="chip" style="--c:#c07830" data-layer="2"><span class="dot"></span>แก่นนอก</div>
    <div class="chip" style="--c:#f0d060" data-layer="3"><span class="dot"></span>แก่นใน</div>
  </div>
  <div id="detail-card" style="--dc:#4a9fd4">
    <h2 id="d-title">เปลือกโลก (Crust)</h2>
    <table id="d-table">
      <tr><td>ประเภท</td><td>Oceanic + Continental</td></tr>
      <tr><td>ธาตุหลัก</td><td>O (46%), Si (28%), Al (8%), Fe (5%)</td></tr>
      <tr><td>ความหนา</td><td>5–70 กม.</td></tr>
      <tr><td>สถานะ</td><td>ของแข็ง</td></tr>
      <tr><td>อุณหภูมิ</td><td>0–1,000 °C</td></tr>
    </table>
  </div>
</div>

<script>
const layerData = [
  { name:"เปลือกโลก (Crust)", color:"#4a9fd4",
    rows:[["ประเภท","Oceanic + Continental"],["ธาตุหลัก","O (46%), Si (28%), Al (8%), Fe (5%)"],["ความหนา","5–70 กม."],["สถานะ","ของแข็ง"],["อุณหภูมิ","0–1,000 °C"]] },
  { name:"เนื้อโลก (Mantle)", color:"#c04010",
    rows:[["ประเภท","Upper + Lower Mantle"],["ธาตุหลัก","O, Si, Mg, Fe (SiO₄)"],["ความหนา","~2,830 กม."],["สถานะ","กึ่งของเหลว"],["อุณหภูมิ","1,000–3,700 °C"]] },
  { name:"แก่นโลกชั้นนอก (Outer Core)", color:"#c07830",
    rows:[["ประเภท","Liquid Metal"],["ธาตุหลัก","Fe (85%), Ni (5%), S, O"],["ความหนา","~2,250 กม."],["สถานะ","ของเหลว"],["อุณหภูมิ","3,700–5,000 °C"]] },
  { name:"แก่นโลกชั้นใน (Inner Core)", color:"#f0d060",
    rows:[["ประเภท","Solid Metal"],["ธาตุหลัก","Fe (85%), Ni (15%)"],["รัศมี","~1,221 กม."],["สถานะ","ของแข็ง"],["อุณหภูมิ","~5,000–6,000 °C"]] }
];

// ── RENDERER ──
const wrap = document.getElementById('canvas-wrap');
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.localClippingEnabled = true;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 1000);
camera.position.z = 4.2;

scene.add(new THREE.AmbientLight(0x446688, 2.0));
const dl = new THREE.DirectionalLight(0xfff4e0, 2.5);
dl.position.set(5,3,5); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x2244aa, 0.6);
dl2.position.set(-5,-2,-3); scene.add(dl2);

// Stars
const sv=[]; for(let i=0;i<1500;i++) sv.push((Math.random()-.5)*200,(Math.random()-.5)*200,(Math.random()-.5)*200);
const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.09})));

// ── EARTH TEXTURE ──
function makeEarthTexture(){
  const W=1024, H=512;
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  const img=ctx.createImageData(W,H); const d=img.data;
  function noise(x,y,z){ return (Math.sin(x*1.7+y*0.9)*Math.cos(y*1.3+z*1.1)*Math.sin(z*0.8+x*1.5)+1)/2; }
  function fbm(x,y,z){ return noise(x,y,z)*0.50+noise(x*2.1,y*2.1,z*2.1)*0.25+noise(x*4.3,y*4.3,z*4.3)*0.125+noise(x*8.7,y*8.7,z*8.7)*0.063; }
  function continentVal(lon,lat){
    const lo=lon/Math.PI, la=lat/(Math.PI/2);
    const nx=Math.cos(lat)*Math.cos(lon), ny=Math.cos(lat)*Math.sin(lon), nz=Math.sin(lat);
    let v=0;
    if(lo>-1.0&&lo<-0.25&&la>0.05&&la<0.92) v=Math.max(v, fbm(nx*3+10,ny*3,nz*3)>0.39?1:0);
    if(lo>-0.88&&lo<-0.18&&la>-0.88&&la<0.08) v=Math.max(v, fbm(nx*3+8,ny*3+5,nz*3)>0.41?1:0);
    if(lo>-0.12&&lo<0.22&&la>0.32&&la<0.78) v=Math.max(v, fbm(nx*4+1,ny*4,nz*4)>0.37?1:0);
    if(lo>0.08&&lo<1.0&&la>0.12&&la<0.92) v=Math.max(v, fbm(nx*2.5+2,ny*2.5+2,nz*2.5)>0.35?1:0);
    if(lo>-0.22&&lo<0.42&&la>-0.78&&la<0.40) v=Math.max(v, fbm(nx*3+5,ny*3+8,nz*3)>0.41?1:0);
    if(lo>0.70&&lo<0.98&&la>-0.65&&la<-0.18) v=Math.max(v, fbm(nx*5+15,ny*5+10,nz*5)>0.46?1:0);
    if(la<-0.83) v=1; if(la>0.90) v=1;
    if(lo>-0.66&&lo<-0.44&&la>0.82) v=1;
    return v;
  }
  for(let py=0;py<H;py++){
    for(let px=0;px<W;px++){
      const lon=(px/W)*Math.PI*2-Math.PI, lat=(0.5-py/H)*Math.PI;
      const nx=Math.cos(lat)*Math.cos(lon), ny=Math.cos(lat)*Math.sin(lon), nz=Math.sin(lat);
      const land=continentVal(lon,lat)>0, f=fbm(nx*3,ny*3,nz*3), absLat=Math.abs(lat);
      let r,g,b;
      if(absLat>1.38){ r=215+f*25; g=228+f*18; b=242+f*12; }
      else if(land){
        if(absLat>1.22){ r=200+f*35; g=210+f*28; b=225+f*22; }
        else {
          const mtn=fbm(nx*6+3,ny*6+3,nz*6+3), lo=lon/Math.PI;
          const desert=(lo>0.02&&lo<0.48&&Math.abs(lat)<0.45);
          if(mtn>0.60){ r=120+f*50; g=105+f*38; b=82+f*28; }
          else if(desert&&mtn<0.52){ r=195+f*35; g=168+f*28; b=98+f*22; }
          else { const veg=fbm(nx*5+7,ny*5+7,nz*5+7); r=38+veg*40+f*20; g=95+veg*55+f*35; b=32+veg*20+f*15; }
        }
      } else { const depth=fbm(nx*2+20,ny*2+20,nz*2+20); r=8+depth*22; g=55+depth*65; b=115+depth*75; }
      const cl=fbm(nx*4+30,ny*4+30,nz*4+30);
      if(cl>0.60){ const cf=Math.min(1,(cl-0.60)/0.22); r=r+(255-r)*cf*0.80; g=g+(255-g)*cf*0.80; b=b+(255-b)*cf*0.80; }
      const i=(py*W+px)*4;
      d[i]=Math.min(255,Math.round(r)); d[i+1]=Math.min(255,Math.round(g)); d[i+2]=Math.min(255,Math.round(b)); d[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  return new THREE.CanvasTexture(cv);
}
const earthTex = makeEarthTexture();

// ── LAYER SETUP ──
const radii  = [1.0,   0.82,   0.46,   0.19];
const colors = [0x2a6ea0, 0xb03010, 0xb07020, 0xd4a830];
const emits  = [0x051525, 0x1a0500, 0x0e0500, 0x180e00];
const hexColors = ['#4a9fd4', '#c04010', '#c07830', '#f0d060'];

const clipPlane = new THREE.Plane(new THREE.Vector3(1, 0, 0), 0);
let sliced = false;
const group = new THREE.Group();
scene.add(group);

let allMeshes = [], capMeshes = [], atmoMesh = null;

function buildSpheres() {
  while(group.children.length) group.remove(group.children[0]);
  allMeshes = []; capMeshes = []; atmoMesh = null;
  for(let i = radii.length - 1; i >= 0; i--) {
    const geo = new THREE.SphereGeometry(radii[i], 64, 32);
    const mat = i === 0
      ? new THREE.MeshPhongMaterial({ map:earthTex, emissive:0x040c18, shininess:55, specular:0x1a3355, side:THREE.FrontSide, clippingPlanes:[], clipShadows:true })
      : new THREE.MeshPhongMaterial({ color:colors[i], emissive:emits[i], shininess:35, side:THREE.FrontSide, clippingPlanes:[], clipShadows:true });
    const m = new THREE.Mesh(geo, mat);
    group.add(m); allMeshes.push(m);
  }
  atmoMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.03, 32, 32),
    new THREE.MeshPhongMaterial({ color:0x4a9fd4, transparent:true, opacity:0.07, side:THREE.FrontSide, depthWrite:false, clippingPlanes:[] })
  );
  group.add(atmoMesh);
  for(let i = radii.length - 1; i >= 0; i--) {
    const innerR = (i < radii.length - 1) ? radii[i + 1] : 0;
    const ringGeo = new THREE.RingGeometry(innerR + 0.001, radii[i], 64);
    const mat = new THREE.MeshPhongMaterial({ color:colors[i], emissive:emits[i], side:THREE.DoubleSide, shininess:20 });
    const cm = new THREE.Mesh(ringGeo, mat);
    cm.rotation.y = Math.PI / 2; cm.visible = false;
    group.add(cm); capMeshes.push(cm);
  }
  applySlice();
}

function applySlice() {
  const planes = sliced ? [clipPlane] : [];
  for(const m of allMeshes) { m.material.clippingPlanes = planes; m.material.needsUpdate = true; }
  if(atmoMesh) { atmoMesh.material.clippingPlanes = planes; atmoMesh.material.needsUpdate = true; atmoMesh.visible = !sliced; }
  for(const cm of capMeshes) cm.visible = sliced;
}
buildSpheres();

// ── RESIZE ──
function resize(){
  const W = wrap.clientWidth, H = wrap.clientHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W / H; camera.updateProjectionMatrix();
}
resize(); new ResizeObserver(resize).observe(wrap);

// ── CONTROLS ──
let rotX = 0.2, rotY = 0, autoRot = true;
let dragging = false, lastX = 0, lastY = 0;
let pinch0 = null, camZ0 = 4.2;
const el = renderer.domElement;

el.addEventListener('mousedown', e => { dragging=true; autoRot=false; lastX=e.clientX; lastY=e.clientY; e.preventDefault(); });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if(!dragging) return;
  rotY += (e.clientX-lastX)*0.012; rotX += (e.clientY-lastY)*0.012;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  lastX=e.clientX; lastY=e.clientY;
});
el.addEventListener('touchstart', e => {
  if(e.touches.length===1){ dragging=true; autoRot=false; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
  if(e.touches.length===2){ dragging=false; pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); camZ0=camera.position.z; }
  e.preventDefault();
},{passive:false});
window.addEventListener('touchend', e => { if(e.touches.length===0){dragging=false;pinch0=null;} if(e.touches.length===1)pinch0=null; },{passive:true});
window.addEventListener('touchmove', e => {
  if(e.touches.length===1&&dragging){ const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY; rotY+=dx*0.012; rotX+=dy*0.012; rotX=Math.max(-1.4,Math.min(1.4,rotX)); lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; }
  if(e.touches.length===2&&pinch0!==null){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); camera.position.z=Math.max(1.8,Math.min(8,camZ0*(pinch0/d))); }
  e.preventDefault();
},{passive:false});
el.addEventListener('wheel', e => { camera.position.z+=e.deltaY*0.004; camera.position.z=Math.max(1.8,Math.min(8,camera.position.z)); },{passive:true});

// ── SLICE BTN ──
document.getElementById('slice-btn').addEventListener('click', () => {
  sliced = !sliced;
  document.getElementById('slice-btn').textContent = sliced ? '🔵 เต็มวง' : '✂️ ตัดครึ่ง';
  applySlice();
  if(sliced){ rotY=-0.4; rotX=0.25; autoRot=false; }
  else autoRot=true;
});

// ── ARROW SYSTEM ──
const arrowSvg = document.getElementById('arrow-svg');
let activeLayer = 0;

// Project a 3D world point to 2D screen coords
function toScreen(worldVec) {
  const v = worldVec.clone().project(camera);
  const rect = wrap.getBoundingClientRect();
  return {
    x: (v.x * 0.5 + 0.5) * rect.width,
    y: (-v.y * 0.5 + 0.5) * rect.height
  };
}

// Get the surface point of a layer at the "equator right side" in world space
function getLayerSurfacePoint(layerIdx) {
  // Point on the surface of this layer facing toward camera-right (+X on screen = right side of globe)
  const r = radii[layerIdx];
  // We'll shoot a point at angle slightly offset to be visible on the right side
  const local = new THREE.Vector3(0, 0, r); // top of sphere in local space rotated
  // Actually use right side: local +x direction but since group rotates, use a stable angle
  // Use the point that's at angle 45 degrees from right in local space
  const angle = -Math.PI * 0.18; // slightly right of top
  const lp = new THREE.Vector3(Math.sin(angle) * r, Math.cos(angle) * r * 0.3, Math.cos(angle) * r);
  // Transform to world space
  lp.applyMatrix4(group.matrixWorld);
  return lp;
}

function drawArrow(layerIdx) {
  arrowSvg.innerHTML = '';
  const color = hexColors[layerIdx];
  const rect = wrap.getBoundingClientRect();

  // Get world-space surface point for this layer
  // Pick a point on the visible right side of the sphere surface
  const r = radii[layerIdx];

  // We want to point to the right side of the globe on screen.
  // Use a local point that after group rotation ends up on the right/upper-right visible face.
  // Strategy: find the world-right direction projected onto the globe surface.
  const localPoint = new THREE.Vector3(r * 0.6, r * 0.5, r * Math.sqrt(1 - 0.36 - 0.25));
  localPoint.normalize().multiplyScalar(r);
  localPoint.applyMatrix4(group.matrixWorld);

  const sp = toScreen(localPoint);

  // Arrow starts from right edge of canvas, ends at surface point
  // But actually: draw from the surface point outward to the right edge with a label
  // We'll draw from surface → right side of screen
  const margin = 18;
  const targetX = rect.width - margin;
  const targetY = sp.y;

  // Clamp targetY
  const clampedTargetY = Math.max(margin, Math.min(rect.height - margin, targetY));

  // Line from surface point to right edge
  const dx = targetX - sp.x;
  const dy = clampedTargetY - sp.y;
  const len = Math.sqrt(dx*dx + dy*dy);

  // Arrowhead pointing toward globe (at sp)
  const arrowLen = 10, arrowW = 5;
  const nx = dx/len, ny = dy/len;
  // Arrowhead tip is at sp (surface), base is along the line direction
  const ax1 = sp.x + arrowW * (-ny) + arrowLen * nx;
  const ay1 = sp.y + arrowW * (nx) + arrowLen * ny;
  const ax2 = sp.x + arrowW * ny + arrowLen * nx;
  const ay2 = sp.y + arrowW * (-nx) + arrowLen * ny;

  // Glow filter
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 3, 0 0, 0 6" fill="${color}" opacity="0.9"/>
    </marker>`;
  arrowSvg.appendChild(defs);

  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','layer-arrow');
  g.setAttribute('filter','url(#glow)');

  // Main line (from target edge toward surface, with arrowhead at surface end)
  const lineLen = Math.sqrt(dx*dx+dy*dy);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', targetX);
  line.setAttribute('y1', clampedTargetY);
  line.setAttribute('x2', sp.x + nx * 4); // stop just before tip
  line.setAttribute('y2', sp.y + ny * 4);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '1.5');
  line.setAttribute('opacity', '0.85');
  line.setAttribute('stroke-dasharray', lineLen);
  line.setAttribute('stroke-dashoffset', lineLen);
  line.style.animation = 'drawLine 0.45s ease forwards';
  line.setAttribute('marker-end', 'url(#arrowhead)');
  g.appendChild(line);

  // Pulsing dot at the surface contact point
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx', sp.x);
  dot.setAttribute('cy', sp.y);
  dot.setAttribute('r', '4');
  dot.setAttribute('fill', color);
  dot.setAttribute('opacity', '0.9');
  dot.setAttribute('class', 'arrow-dot');
  g.appendChild(dot);

  // Ripple ring
  const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx', sp.x);
  ring.setAttribute('cy', sp.y);
  ring.setAttribute('r', '4');
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', color);
  ring.setAttribute('stroke-width', '1.5');
  ring.setAttribute('opacity', '0');
  ring.style.animation = 'none';
  ring.style.transformOrigin = `${sp.x}px ${sp.y}px`;
  g.appendChild(ring);

  // Animate ring expand
  setTimeout(() => {
    ring.style.transition = 'r 0.6s ease-out, opacity 0.6s ease-out';
    ring.setAttribute('r', '14');
    ring.setAttribute('opacity', '0');
    ring.style.animation = 'ripple 0.8s 0.4s ease-out infinite';
  }, 350);

  arrowSvg.appendChild(g);
}

// Inject ripple keyframe
const style = document.createElement('style');
style.textContent = `
  @keyframes ripple {
    0%   { r:4;  opacity:0.6; }
    100% { r:18; opacity:0;   }
  }
`;
document.head.appendChild(style);

// ── CHIPS ──
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const idx = parseInt(chip.dataset.layer);
    activeLayer = idx;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const d = layerData[idx];
    document.getElementById('detail-card').style.setProperty('--dc', d.color);
    document.getElementById('d-title').textContent = d.name;
    document.getElementById('d-table').innerHTML = d.rows.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
    drawArrow(idx);
  });
});

// Draw initial arrow
setTimeout(() => drawArrow(0), 200);

// ── ANIMATE ──
function animate(){
  requestAnimationFrame(animate);
  if(autoRot) rotY += 0.004;
  group.rotation.x = rotX; group.rotation.y = rotY;
  if(sliced){
    const localX = new THREE.Vector3(1,0,0).applyEuler(group.rotation);
    clipPlane.normal.copy(localX); clipPlane.constant = 0;
  }
  // Redraw arrow every frame to track rotation
  if(activeLayer !== null) drawArrow(activeLayer);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
